<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Jonathan Tamen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        /* Custom styles for the article content to keep Word formatting looking good */
        .article-content p {
            margin-bottom: 1.5rem;
            line-height: 1.75;
            font-size: 1.125rem;
        }

        .article-content h1 {
            font-size: 1.875rem;
            font-weight: 800;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: #111827;
        }

        .article-content h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: #111827;
        }

        .article-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            color: #111827;
        }

        .article-content ul,
        .article-content ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .article-content li {
            margin-bottom: 0.5rem;
            line-height: 1.75;
            font-size: 1.125rem;
        }

        .article-content ul li {
            list-style-type: disc;
        }

        .article-content ol li {
            list-style-type: decimal;
        }

        .article-content b,
        .article-content strong {
            font-weight: 700;
            color: #111827;
        }

        .article-content i,
        .article-content em {
            font-style: italic;
        }

        .article-content a {
            color: #2563eb;
            text-decoration: underline;
        }

        .article-content a:hover {
            color: #1d4ed8;
        }

        .article-content blockquote {
            border-left: 4px solid #d1d5db;
            padding-left: 1rem;
            margin: 1.5rem 0;
            color: #6b7280;
            font-style: italic;
        }

        .article-content hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 2rem 0;
        }

        .article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 py-4">
            <div class="flex flex-col sm:flex-row justify-between items-center">
                <div class="mb-4 sm:mb-0">
                    <a href="{{ site.url | default: '/' }}" class="text-2xl font-bold text-gray-900">Jonathan
                        Tamen</a>
                </div>
                <nav class="flex space-x-6 items-center text-sm sm:text-base">
                    <a href="/"
                        class="text-gray-600 hover:text-gray-900 transition-colors">About</a>
                    <a href="/projects.html" class="text-gray-600 hover:text-gray-900 transition-colors">Projects</a>
                    <a href="/articles.html"
                        class="font-semibold text-gray-900 border-b-2 border-gray-900 pb-1">Articles</a>
                    <a href="/assets/resume.pdf" target="_blank"
                        class="bg-gray-100 hover:bg-gray-200 text-gray-900 px-4 py-2 rounded font-medium transition-colors border border-gray-300">View
                        CV</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-3xl mx-auto px-6 py-12 w-full">
        <!-- Back Link -->
        <div class="mb-8">
            <a href="/articles.html"
                class="text-blue-600 hover:text-blue-800 flex items-center gap-2 text-sm font-medium">
                <i class="fas fa-arrow-left"></i> Back to Articles
            </a>
        </div>

        <!-- Article Header -->
        <article>
            <header class="mb-10">
                <h1 class="text-4xl font-medium text-gray-900 mb-4 leading-tight">
                    {{ page.title }}
                </h1>
                <div class="flex items-center text-gray-500 text-sm gap-4">
                    {% if page.date %}
                    <span><i class="far fa-calendar-alt mr-2"></i> {{ page.date | date: "%B %-d, %Y" }}</span>
                    {% endif %}
                    {% if page.read_time %}
                    <span><i class="far fa-clock mr-2"></i> {{ page.read_time }}</span>
                    {% endif %}
                </div>
            </header>

            <!-- Article Body -->
            <div class="article-content text-gray-800">
                {{ content }}
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto py-8">
        <div class="max-w-4xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center text-sm">
            <p class="text-gray-500 mb-4 sm:mb-0">
                &copy;
                <script>document.write(new Date().getFullYear())</script> Jonathan Tamen. All rights reserved.
            </p>
            <div class="flex space-x-6 text-gray-500 text-lg">
                <a href="https://github.com/jonathantamen" target="_blank" rel="noopener noreferrer"
                    class="hover:text-gray-900 transition-colors" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://instagram.com/jonathantamen" target="_blank" rel="noopener noreferrer"
                    class="hover:text-gray-900 transition-colors" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.linkedin.com/in/jonathantamen/" target="_blank" rel="noopener noreferrer"
                    class="hover:text-gray-900 transition-colors" aria-label="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="mailto:jonathan.tamen@gmail.com" class="hover:text-gray-900 transition-colors"
                    aria-label="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
    </footer>

</body>

</html>
