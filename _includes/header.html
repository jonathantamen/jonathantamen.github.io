<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-4xl mx-auto px-6 py-4">
    <div class="flex flex-col sm:flex-row justify-between items-center">
      <div class="mb-4 sm:mb-0">
        <a
          href="https://jonathantamen.github.io/"
          class="text-2xl font-bold text-gray-900"
          >Jonathan Tamen</a
        >
      </div>
      <nav class="flex space-x-6 items-center text-sm sm:text-base">
        <a
          href="https://jonathantamen.github.io/"
          class="{% if include.active == 'about' %}font-semibold text-gray-900 border-b-2 border-gray-900 pb-1{% else %}text-gray-600 hover:text-gray-900 transition-colors{% endif %}"
          >About</a
        >
        <a
          href="/projects"
          class="{% if include.active == 'projects' %}font-semibold text-gray-900 border-b-2 border-gray-900 pb-1{% else %}text-gray-600 hover:text-gray-900 transition-colors{% endif %}"
          >Projects</a
        >
        <a
          href="/articles"
          class="{% if include.active == 'articles' %}font-semibold text-gray-900 border-b-2 border-gray-900 pb-1{% else %}text-gray-600 hover:text-gray-900 transition-colors{% endif %}"
          >Articles</a
        >
        <a
          href="/assets/resume"
          target="_blank"
          class="bg-gray-100 hover:bg-gray-200 text-gray-900 px-4 py-2 rounded font-medium transition-colors border border-gray-300"
          >View CV</a
        >
      </nav>
    </div>
  </div>
</header>
