<h1 class="code-line has-line-data" data-line-start="0" data-line-end="1"><a id="Closing_a_Loop_0"></a>Closing a Loop</h1>
<p class="has-line-data" data-line-start="2" data-line-end="3">A shirt for a non-profit. One which seeks to instill confidence in young students through STEM education. It wraps around my body and not in the most comfortable way. It is a cheap, scratchy material that saved the organization some money. The sleeves are a little too short compared to how the rest of the shirt fits on my torso and sometimes ride up my arms. The logo – <strong>Helping Hands MB</strong> – is in the wrong font on this shirt but sits across the entire chest. A giant globe with a hand of many shades – to represent the diversity of people across the world - reaching towards the earth to signify that anyone can achieve anything with the right tools and confidence.</p>
<p class="has-line-data" data-line-start="4" data-line-end="5">In the rest of the room, the air conditioning is fighting a battle against thirty-five people cramped too closely in too small of a classroom. So far, for now, it is winning and at least everyone has a seat. On the tables, there are batteries, wires, LED bulbs, and various other electric components strewn across the surfaces and surrounding them are children, ten and eleven years old, with a wide display of emotions. Some are excited at the chance to do something completely new.</p>
<p class="has-line-data" data-line-start="6" data-line-end="7">They have never seen an electrical circuit before. Well, they have every day, but they never <em>realized</em> it. The excited ones had their chance to place the wires together and got the lightbulb to illuminate in blinking red. Others, looking more disappointed, have been waiting for their turn with no luck. The first in turn order to build the circuit is the luckiest: they get the control of placing the pieces together with their own hands, the anticipation of not knowing whether the circuit was correctly connected, and the ultimate satisfaction when they finally get it to work.</p>
<p class="has-line-data" data-line-start="8" data-line-end="9">One child has not been able to get it to work yet. Jayden looks up at me and does not notice the wrong font on my shirt or irritation on my collar. Jayden sees my shirt, the giant globe, and assumes I am here to help. They lift the ‘completed’ circuit not-so-gently at the same time I lean over the table, so I only have a few inches in between my face and the mess of wires.</p>
<p class="has-line-data" data-line-start="10" data-line-end="11">“This one is broken” Jayden says to me.</p>
<p class="has-line-data" data-line-start="12" data-line-end="13">“Is it really?” The chances are slim to none. Everyone else got it to work and two new triple-A batteries will have enough charge to power the light for 50 hours continuously.<a href="#_ftn1">[1]</a></p>
<p class="has-line-data" data-line-start="14" data-line-end="15">I quiz Jayden about the proper directional flow of electrons. If the electrons try to enter the “wrong” side of the LED, the bulb inside simply knows to block it (else it will break), so the circuit only works as a closed loop if the wires and battery are connected in the correct direction. Working together as a team, they learn together that electricity is a movement from the negative side, where negatively charged electrons are ready to leave, to the positive side, which pulls them in. Subsequently, Jayden and the rest of her team turn the handful of plastic and wires into red blinking light!</p>
<p class="has-line-data" data-line-start="16" data-line-end="17">I see the light in their circuit, on their faces, and feel the glow inside me. While I straighten up and remember the uncomfortable shirt, I am also reminded of the good we do when helping one another solve a problem.</p>
<p class="has-line-data" data-line-start="18" data-line-end="19">Read more about our work at <a href="www.helpinghandsmb.org">Helping Hands MB</a>.</p>
<hr>
<p class="has-line-data" data-line-start="20" data-line-end="21"><a href="#_ftnref1">[1]</a> The LED draws 20 milliamps to blink at any given moment. The batteries capacity is up to 1,000 milliamps for 1 hour, or 1 milliamps for 1,000 hours. 1,000 milliamps <em>hours</em> storage / 20 milliamps draw = 50 <em>hours</em></p>
